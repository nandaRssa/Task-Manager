<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – TaskManager</title>
  <meta name="description" content="Sign in to TaskManager – manage your tasks efficiently." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">✦</div>
        <span class="auth-logo-text">TaskManager</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <div id="alertBox" class="alert alert-error" role="alert">
        <span>⚠</span>
        <span id="alertMsg">Something went wrong.</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input id="email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email" required />
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required />
          <span class="form-error" id="passwordError"></span>
        </div>

        <button id="submitBtn" type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" class="spinner" style="display:none"></span>
        </button>
      </form>

      <div class="divider"></div>
      <p class="text-sm text-muted" style="text-align:center">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (tokenManager.getAccessToken()) {
      window.location.href = 'dashboard.html';
    }

    const form       = document.getElementById('loginForm');
    const alertBox   = document.getElementById('alertBox');
    const alertMsg   = document.getElementById('alertMsg');
    const submitBtn  = document.getElementById('submitBtn');
    const btnText    = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    function setLoading(on) {
      submitBtn.disabled = on;
      btnText.textContent = on ? 'Signing in…' : 'Sign In';
      btnSpinner.style.display = on ? 'inline-block' : 'none';
    }

    function showError(msg) {
      alertMsg.textContent = msg;
      alertBox.classList.add('visible');
    }

    function clearErrors() {
      alertBox.classList.remove('visible');
      ['emailError','passwordError'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = '';
        el.classList.remove('visible');
      });
    }

    function fieldError(fieldId, msg) {
      const el = document.getElementById(fieldId);
      el.textContent = msg;
      el.classList.add('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      let valid = true;
      if (!email)    { fieldError('emailError', 'Email is required'); valid = false; }
      if (!password) { fieldError('passwordError', 'Password is required'); valid = false; }
      if (!valid) return;

      setLoading(true);
      const { data, error } = await api.post('/auth/login', { email, password });
      setLoading(false);

      if (error) return showError(error);

      tokenManager.setTokens(data.data.accessToken, data.data.refreshToken);
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
