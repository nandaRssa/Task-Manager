<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Task – TaskManager</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">✦</div>
        <span class="sidebar-logo-text">TaskManager</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span>⊞</span> Dashboard
        </a>
        <a href="create-task.html" class="nav-item active">
          <span>＋</span> New Task
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-secondary btn-full" style="justify-content:flex-start;gap:10px;font-size:14px">
          <span>⏻</span> Logout
        </button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <span class="topbar-title">New Task</span>
        <div class="user-chip">
          <div class="user-avatar" id="userInitial">?</div>
          <span class="user-name" id="userName">Loading…</span>
        </div>
      </header>

      <main class="page-content">
        <div class="breadcrumb">
          <a href="dashboard.html">Dashboard</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">New Task</span>
        </div>

        <div class="page-header">
          <div>
            <h1 class="page-title">Create New Task</h1>
            <p class="page-subtitle">Fill in the details for your new task</p>
          </div>
        </div>

        <div class="card" style="max-width:600px">
          <div id="alertBox" class="alert alert-error">
            <span>⚠</span><span id="alertMsg"></span>
          </div>

          <form id="createTaskForm" novalidate>
            <div class="form-group">
              <label class="form-label" for="title">Task Title *</label>
              <input id="title" type="text" class="form-control" placeholder="Enter task title" required />
              <span class="form-error" id="titleError"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description</label>
              <textarea id="description" class="form-control" placeholder="Describe the task (optional)" rows="4"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="status">Status</label>
              <select id="status" class="form-control">
                <option value="pending">⏳ Pending</option>
                <option value="in_progress">🔄 In Progress</option>
                <option value="completed">✅ Completed</option>
              </select>
            </div>

            <div class="d-flex gap-2 mt-2">
              <a href="dashboard.html" class="btn btn-secondary flex-1">Cancel</a>
              <button id="submitBtn" type="submit" class="btn btn-primary flex-1">
                <span id="btnText">Create Task</span>
                <span id="btnSpinner" class="spinner" style="display:none"></span>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/create-task.js"></script>
</body>
</html>
